<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FRC Sprint Board</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b0f;
  --surface:#10131a;
  --surface2:#161b24;
  --border:rgba(255,255,255,0.07);
  --border2:rgba(255,255,255,0.12);
  --text:#e2e6f0;
  --muted:#5a6478;
  --muted2:#8896b0;

  --cad:#3a86ff;
  --electrical:#ffd60a;
  --machining:#fb5607;
  --controls:#06d6a0;
  --business:#8338ec;
  --media:#ff006e;
  --outreach:#00b4d8;
  --programming:#e63946;

  --todo-bg:#0f1219;
  --inprog-bg:#0d1420;
  --review-bg:#0d1a16;
  --done-bg:#12100f;
}

html{height:100%}
body{
  font-family:'Barlow',sans-serif;
  background:var(--bg);
  color:var(--text);
  height:100%;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ═══ TOP BAR ═══ */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 1.5rem;height:54px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  gap:1rem;
  z-index:100;
}
.topbar-left{display:flex;align-items:center;gap:1.2rem}
.logo{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:1.2rem;
  text-transform:uppercase;letter-spacing:0.06em;
  color:var(--programming);white-space:nowrap;
}
.logo span{color:var(--text)}
.sprint-badge{
  background:rgba(230,57,70,0.12);
  border:1px solid rgba(230,57,70,0.25);
  color:var(--programming);
  font-size:0.68rem;font-weight:600;
  letter-spacing:0.15em;text-transform:uppercase;
  padding:0.25rem 0.7rem;border-radius:3px;
  cursor:pointer;white-space:nowrap;
}
.sprint-name-input{
  background:transparent;border:none;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:1rem;
  text-transform:uppercase;letter-spacing:0.08em;
  color:var(--muted2);width:180px;outline:none;
  cursor:pointer;
}
.sprint-name-input:focus{color:var(--text);border-bottom:1px solid var(--border2)}

.topbar-right{display:flex;align-items:center;gap:0.6rem}
.filter-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted2);font-size:0.7rem;font-weight:500;
  letter-spacing:0.1em;text-transform:uppercase;
  padding:0.35rem 0.8rem;border-radius:3px;cursor:pointer;
  transition:all 0.15s;white-space:nowrap;
}
.filter-btn:hover,.filter-btn.active{
  border-color:var(--border2);color:var(--text);
  background:#1e2330;
}
.filter-btn.active{
  border-color:var(--programming);color:var(--programming);
  background:rgba(230,57,70,0.08);
}
.add-task-btn{
  background:var(--programming);color:#fff;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:0.75rem;letter-spacing:0.12em;
  text-transform:uppercase;padding:0.4rem 1rem;
  border:none;border-radius:3px;cursor:pointer;
  transition:background 0.15s;white-space:nowrap;
}
.add-task-btn:hover{background:#c1121f}

/* ═══ SUBSECTION FILTER BAR ═══ */
.subbar{
  display:flex;align-items:center;gap:0.4rem;
  padding:0.5rem 1.5rem;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;
}
.subbar::-webkit-scrollbar{height:3px}
.subbar::-webkit-scrollbar-track{background:transparent}
.subbar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

.sub-pill{
  display:flex;align-items:center;gap:0.4rem;
  padding:0.3rem 0.75rem;
  border-radius:3px;
  border:1px solid transparent;
  font-size:0.68rem;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 0.15s;
  white-space:nowrap;
  background:rgba(255,255,255,0.03);
  color:var(--muted2);
}
.sub-pill .dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--pill-color);flex-shrink:0;
}
.sub-pill:hover{background:rgba(255,255,255,0.06);color:var(--text)}
.sub-pill.active{
  background:rgba(var(--pill-rgb),0.1);
  border-color:rgba(var(--pill-rgb),0.35);
  color:var(--pill-color);
}
.sub-all{
  padding:0.3rem 0.75rem;border-radius:3px;
  border:1px solid var(--border2);
  font-size:0.68rem;font-weight:600;
  letter-spacing:0.1em;text-transform:uppercase;
  cursor:pointer;transition:all 0.15s;
  background:rgba(255,255,255,0.05);color:var(--text);
  white-space:nowrap;
}
.sub-all:hover,.sub-all.active{
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.25);
}

/* ═══ BOARD ═══ */
.board{
  display:flex;gap:1px;
  flex:1;overflow:hidden;
  background:var(--border);
}
.column{
  display:flex;flex-direction:column;
  flex:1;min-width:220px;
  background:var(--bg);
  overflow:hidden;
}
.col-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.9rem 1rem 0.75rem;
  flex-shrink:0;
}
.col-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:0.75rem;
  letter-spacing:0.22em;text-transform:uppercase;
  display:flex;align-items:center;gap:0.5rem;
}
.col-dot{width:7px;height:7px;border-radius:50%}
.col-count{
  font-size:0.68rem;font-weight:500;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  color:var(--muted2);
  padding:0.15rem 0.5rem;border-radius:10px;
  min-width:1.8rem;text-align:center;
}
.col-add{
  background:none;border:none;color:var(--muted);
  font-size:1.1rem;cursor:pointer;padding:0 0.2rem;
  transition:color 0.15s;line-height:1;
}
.col-add:hover{color:var(--text)}

.cards-wrap{
  flex:1;overflow-y:auto;
  padding:0.5rem;
  display:flex;flex-direction:column;gap:0.5rem;
}
.cards-wrap::-webkit-scrollbar{width:3px}
.cards-wrap::-webkit-scrollbar-track{background:transparent}
.cards-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ═══ CARD ═══ */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:5px;padding:0.85rem 0.9rem;
  cursor:grab;
  transition:border-color 0.15s, transform 0.15s, box-shadow 0.15s;
  position:relative;overflow:hidden;
  user-select:none;
}
.card::before{
  content:'';position:absolute;left:0;top:0;bottom:0;
  width:3px;background:var(--sub-color,#444);
}
.card:hover{
  border-color:var(--border2);
  box-shadow:0 4px 20px rgba(0,0,0,0.35);
}
.card.dragging{
  opacity:0.5;transform:rotate(2deg);cursor:grabbing;
}
.card.drag-over{
  border-color:var(--programming);
  box-shadow:0 0 0 1px var(--programming);
}

.card-sub{
  font-size:0.6rem;font-weight:600;
  letter-spacing:0.15em;text-transform:uppercase;
  color:var(--sub-color);margin-bottom:0.45rem;
}
.card-title{
  font-size:0.85rem;font-weight:500;
  line-height:1.4;color:var(--text);margin-bottom:0.6rem;
}
.card-meta{
  display:flex;align-items:center;justify-content:space-between;
  gap:0.5rem;
}
.card-points{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.68rem;font-weight:700;
  letter-spacing:0.1em;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  color:var(--muted2);
  padding:0.15rem 0.45rem;border-radius:3px;
}
.card-priority{
  font-size:0.6rem;font-weight:600;letter-spacing:0.1em;
  text-transform:uppercase;padding:0.15rem 0.45rem;border-radius:3px;
}
.priority-high{background:rgba(230,57,70,0.15);color:#e63946}
.priority-med{background:rgba(255,214,10,0.12);color:#ffd60a}
.priority-low{background:rgba(6,214,160,0.12);color:#06d6a0}

.card-actions{
  display:none;position:absolute;top:0.5rem;right:0.5rem;
  gap:0.25rem;
}
.card:hover .card-actions{display:flex}
.card-action-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--muted2);font-size:0.65rem;
  padding:0.2rem 0.4rem;border-radius:2px;
  cursor:pointer;transition:all 0.1s;
}
.card-action-btn:hover{color:var(--text);border-color:var(--border2)}

.drop-zone{
  min-height:60px;border-radius:4px;
  border:2px dashed transparent;
  transition:border-color 0.15s, background 0.15s;
  flex-shrink:0;
}
.drop-zone.active{
  border-color:rgba(230,57,70,0.4);
  background:rgba(230,57,70,0.04);
}

/* ═══ MODAL ═══ */
.modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0.7);
  display:flex;align-items:center;justify-content:center;
  padding:1rem;
  opacity:0;pointer-events:none;
  transition:opacity 0.2s;
}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:8px;width:100%;max-width:480px;
  padding:1.75rem;
  transform:translateY(12px);
  transition:transform 0.2s;
}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-title{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:800;font-size:1.3rem;
  text-transform:uppercase;letter-spacing:0.04em;
  margin-bottom:1.5rem;
  color:var(--text);
}
.field{margin-bottom:1rem}
.field label{
  display:block;font-size:0.65rem;font-weight:600;
  letter-spacing:0.18em;text-transform:uppercase;
  color:var(--muted2);margin-bottom:0.4rem;
}
.field input,.field select,.field textarea{
  width:100%;background:var(--surface2);
  border:1px solid var(--border);border-radius:4px;
  padding:0.6rem 0.85rem;
  font-family:'Barlow',sans-serif;font-size:0.85rem;
  color:var(--text);outline:none;
  transition:border-color 0.15s;
  -webkit-appearance:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--programming)}
.field textarea{resize:vertical;min-height:80px}
.field select option{background:#1a1f2e}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem}
.modal-actions{display:flex;gap:0.75rem;margin-top:1.5rem}
.modal-btn{
  flex:1;padding:0.7rem;border:none;border-radius:4px;
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:0.8rem;letter-spacing:0.12em;
  text-transform:uppercase;cursor:pointer;transition:all 0.15s;
}
.modal-btn-primary{background:var(--programming);color:#fff}
.modal-btn-primary:hover{background:#c1121f}
.modal-btn-cancel{background:var(--surface2);color:var(--muted2);border:1px solid var(--border)}
.modal-btn-cancel:hover{color:var(--text);border-color:var(--border2)}

/* ═══ BURN-DOWN PANEL ═══ */
.stats-bar{
  display:flex;align-items:center;gap:1.5rem;
  padding:0.55rem 1.5rem;
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;
}
.stat-item{
  display:flex;align-items:center;gap:0.5rem;
  white-space:nowrap;
}
.stat-label{font-size:0.65rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
.stat-val{
  font-family:'Barlow Condensed',sans-serif;
  font-weight:700;font-size:0.95rem;color:var(--text);
}
.stat-divider{width:1px;height:1.2rem;background:var(--border);flex-shrink:0}
.progress-bar-wrap{
  display:flex;align-items:center;gap:0.6rem;
  flex:1;min-width:120px;
}
.progress-bar{
  flex:1;height:4px;background:rgba(255,255,255,0.07);
  border-radius:2px;overflow:hidden;min-width:60px;
}
.progress-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--controls),var(--cad));
  transition:width 0.4s ease;
}
.progress-pct{font-size:0.7rem;font-weight:600;color:var(--controls);white-space:nowrap}

/* ═══ EMPTY STATE ═══ */
.empty-card{
  border:1px dashed rgba(255,255,255,0.07);
  border-radius:5px;padding:1.5rem;
  text-align:center;color:var(--muted);
  font-size:0.75rem;letter-spacing:0.05em;
}

/* ═══ TOAST ═══ */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:5px;padding:0.7rem 1.2rem;
  font-size:0.8rem;color:var(--text);
  box-shadow:0 8px 30px rgba(0,0,0,0.4);
  transform:translateY(10px);opacity:0;
  transition:all 0.25s;pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}

/* ═══ SCROLLBAR ═══ */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">FRC <span>Sprint</span></div>
    <div class="sprint-badge" id="sprintBadgeBtn">▶ SPRINT</div>
    <input class="sprint-name-input" id="sprintName" value="Build Season Sprint 1" title="Click to rename"/>
  </div>
  <div class="topbar-right">
    <div class="filter-btn" id="filterHighBtn" onclick="togglePriorityFilter('high',this)">🔴 High</div>
    <div class="filter-btn" id="filterMedBtn" onclick="togglePriorityFilter('med',this)">🟡 Med</div>
    <div class="filter-btn" id="filterLowBtn" onclick="togglePriorityFilter('low',this)">🟢 Low</div>
    <button class="add-task-btn" onclick="openModal()">+ Add Task</button>
  </div>
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-item">
    <span class="stat-label">Total</span>
    <span class="stat-val" id="statTotal">0</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-label">In Progress</span>
    <span class="stat-val" id="statInprog">0</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-label">Done</span>
    <span class="stat-val" id="statDone">0</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item">
    <span class="stat-label">Story Pts</span>
    <span class="stat-val" id="statPts">0</span>
  </div>
  <div class="stat-divider"></div>
  <div class="stat-item progress-bar-wrap">
    <span class="stat-label">Progress</span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="progress-pct" id="progressPct">0%</span>
  </div>
</div>

<!-- SUBSECTION FILTER BAR -->
<div class="subbar">
  <div class="sub-all active" id="filterAll" onclick="setSubFilter('all')">All</div>
  <div class="sub-pill active" style="--pill-color:var(--cad);--pill-rgb:58,134,255"   onclick="setSubFilter('CAD')"          id="pill-CAD">         <span class="dot"></span>CAD</div>
  <div class="sub-pill"        style="--pill-color:var(--electrical);--pill-rgb:255,214,10" onclick="setSubFilter('Electrical')"  id="pill-Electrical">  <span class="dot"></span>Electrical</div>
  <div class="sub-pill"        style="--pill-color:var(--machining);--pill-rgb:251,86,7"   onclick="setSubFilter('Machining')"   id="pill-Machining">   <span class="dot"></span>Machining</div>
  <div class="sub-pill"        style="--pill-color:var(--controls);--pill-rgb:6,214,160"   onclick="setSubFilter('Controls')"    id="pill-Controls">    <span class="dot"></span>Controls</div>
  <div class="sub-pill"        style="--pill-color:var(--business);--pill-rgb:131,56,236"  onclick="setSubFilter('Business')"    id="pill-Business">    <span class="dot"></span>Business</div>
  <div class="sub-pill"        style="--pill-color:var(--media);--pill-rgb:255,0,110"      onclick="setSubFilter('Media')"       id="pill-Media">       <span class="dot"></span>Media</div>
  <div class="sub-pill"        style="--pill-color:var(--outreach);--pill-rgb:0,180,216"   onclick="setSubFilter('Outreach')"    id="pill-Outreach">    <span class="dot"></span>Outreach</div>
  <div class="sub-pill"        style="--pill-color:var(--programming);--pill-rgb:230,57,70" onclick="setSubFilter('Programming')" id="pill-Programming"> <span class="dot"></span>Programming</div>
</div>

<!-- BOARD -->
<div class="board" id="board">
  <div class="column" id="col-todo">
    <div class="col-header">
      <div class="col-title"><div class="col-dot" style="background:#5a6478"></div>Backlog</div>
      <div style="display:flex;align-items:center;gap:0.5rem">
        <span class="col-count" id="cnt-todo">0</span>
        <button class="col-add" onclick="openModal('todo')" title="Add task">+</button>
      </div>
    </div>
    <div class="cards-wrap" id="cards-todo" ondragover="onDragOver(event)" ondrop="onDrop(event,'todo')" ondragleave="onDragLeave(event)">
      <div class="drop-zone" id="dz-todo"></div>
    </div>
  </div>
  <div class="column" id="col-inprog">
    <div class="col-header">
      <div class="col-title"><div class="col-dot" style="background:#3a86ff"></div>In Progress</div>
      <div style="display:flex;align-items:center;gap:0.5rem">
        <span class="col-count" id="cnt-inprog">0</span>
        <button class="col-add" onclick="openModal('inprog')" title="Add task">+</button>
      </div>
    </div>
    <div class="cards-wrap" id="cards-inprog" ondragover="onDragOver(event)" ondrop="onDrop(event,'inprog')" ondragleave="onDragLeave(event)">
      <div class="drop-zone" id="dz-inprog"></div>
    </div>
  </div>
  <div class="column" id="col-review">
    <div class="col-header">
      <div class="col-title"><div class="col-dot" style="background:#ffd60a"></div>Review</div>
      <div style="display:flex;align-items:center;gap:0.5rem">
        <span class="col-count" id="cnt-review">0</span>
        <button class="col-add" onclick="openModal('review')" title="Add task">+</button>
      </div>
    </div>
    <div class="cards-wrap" id="cards-review" ondragover="onDragOver(event)" ondrop="onDrop(event,'review')" ondragleave="onDragLeave(event)">
      <div class="drop-zone" id="dz-review"></div>
    </div>
  </div>
  <div class="column" id="col-done">
    <div class="col-header">
      <div class="col-title"><div class="col-dot" style="background:#06d6a0"></div>Done</div>
      <div style="display:flex;align-items:center;gap:0.5rem">
        <span class="col-count" id="cnt-done">0</span>
        <button class="col-add" onclick="openModal('done')" title="Add task">+</button>
      </div>
    </div>
    <div class="cards-wrap" id="cards-done" ondragover="onDragOver(event)" ondrop="onDrop(event,'done')" ondragleave="onDragLeave(event)">
      <div class="drop-zone" id="dz-done"></div>
    </div>
  </div>
</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">New Task</div>
    <div class="field">
      <label>Task Title</label>
      <input id="fTitle" type="text" placeholder="e.g. Design intake bracket"/>
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="fDesc" placeholder="Optional details…"></textarea>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Subsection</label>
        <select id="fSub">
          <option value="CAD">CAD</option>
          <option value="Electrical">Electrical</option>
          <option value="Machining">Machining</option>
          <option value="Controls">Controls</option>
          <option value="Business">Business</option>
          <option value="Media">Media</option>
          <option value="Outreach">Outreach</option>
          <option value="Programming">Programming</option>
        </select>
      </div>
      <div class="field">
        <label>Priority</label>
        <select id="fPriority">
          <option value="high">🔴 High</option>
          <option value="med" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Story Points</label>
        <select id="fPoints">
          <option>1</option><option>2</option><option selected>3</option>
          <option>5</option><option>8</option><option>13</option>
        </select>
      </div>
      <div class="field">
        <label>Column</label>
        <select id="fCol">
          <option value="todo">Backlog</option>
          <option value="inprog">In Progress</option>
          <option value="review">Review</option>
          <option value="done">Done</option>
        </select>
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-btn modal-btn-primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── DATA ──────────────────────────────────────────────────
const SUB_COLORS = {
  CAD:'#3a86ff', Electrical:'#ffd60a', Machining:'#fb5607',
  Controls:'#06d6a0', Business:'#8338ec', Media:'#ff006e',
  Outreach:'#00b4d8', Programming:'#e63946'
};

let tasks = [];
let nextId = 1;
let editingId = null;
let dragId = null;
let activeSubFilter = 'all';
let activePriorityFilters = new Set();

// ── SEED DATA ─────────────────────────────────────────────
const seed = [
  {title:'Model intake mechanism',sub:'CAD',priority:'high',points:8,col:'inprog'},
  {title:'Design drivetrain frame',sub:'CAD',priority:'high',points:13,col:'todo'},
  {title:'Create shooter BOM',sub:'CAD',priority:'med',points:3,col:'review'},
  {title:'Wire PDP and breakers',sub:'Electrical',priority:'high',points:5,col:'inprog'},
  {title:'Label all motor controllers',sub:'Electrical',priority:'med',points:2,col:'todo'},
  {title:'Route CAN bus harness',sub:'Electrical',priority:'high',points:5,col:'todo'},
  {title:'Mill arm pivot plates',sub:'Machining',priority:'high',points:8,col:'inprog'},
  {title:'Cut drivetrain tubing',sub:'Machining',priority:'high',points:5,col:'done'},
  {title:'Tap gearbox mounting holes',sub:'Machining',priority:'med',points:3,col:'todo'},
  {title:'Tune elevator PID',sub:'Controls',priority:'high',points:8,col:'inprog'},
  {title:'Calibrate gyro heading',sub:'Controls',priority:'med',points:3,col:'review'},
  {title:'Characterize drivetrain with SysId',sub:'Controls',priority:'high',points:5,col:'todo'},
  {title:'Write sponsorship proposal',sub:'Business',priority:'high',points:5,col:'done'},
  {title:'Update team budget sheet',sub:'Business',priority:'med',points:2,col:'todo'},
  {title:'Film reveal video',sub:'Media',priority:'med',points:5,col:'todo'},
  {title:'Post build season update',sub:'Media',priority:'low',points:1,col:'done'},
  {title:'Schedule FLL demo day',sub:'Outreach',priority:'med',points:3,col:'todo'},
  {title:'Write Chairman\'s Award essay',sub:'Outreach',priority:'high',points:8,col:'inprog'},
  {title:'Implement auto path planner',sub:'Programming',priority:'high',points:13,col:'inprog'},
  {title:'Add AprilTag vision tracking',sub:'Programming',priority:'high',points:8,col:'todo'},
  {title:'Write teleop drive command',sub:'Programming',priority:'med',points:3,col:'done'},
];
seed.forEach(s => {
  tasks.push({id:nextId++,...s});
});

// ── RENDER ────────────────────────────────────────────────
function render(){
  const cols = ['todo','inprog','review','done'];
  cols.forEach(col=>{
    const wrap = document.getElementById('cards-'+col);
    // clear existing cards (keep drop zone)
    [...wrap.querySelectorAll('.card')].forEach(c=>c.remove());
    const dz = document.getElementById('dz-'+col);

    let filtered = tasks.filter(t=>t.col===col);
    if(activeSubFilter!=='all') filtered=filtered.filter(t=>t.sub===activeSubFilter);
    if(activePriorityFilters.size>0) filtered=filtered.filter(t=>activePriorityFilters.has(t.priority));

    filtered.forEach(task=>{
      const el = buildCard(task);
      wrap.insertBefore(el, dz);
    });

    // empty state
    const empties = wrap.querySelectorAll('.empty-card');
    empties.forEach(e=>e.remove());
    if(filtered.length===0){
      const emp = document.createElement('div');
      emp.className='empty-card';
      emp.textContent='No tasks';
      wrap.insertBefore(emp, dz);
    }
  });
  updateCounts();
  updateStats();
}

function buildCard(task){
  const el = document.createElement('div');
  el.className='card';
  el.draggable=true;
  el.dataset.id=task.id;
  el.style.setProperty('--sub-color', SUB_COLORS[task.sub]||'#444');

  const prioClass = task.priority==='high'?'priority-high':task.priority==='med'?'priority-med':'priority-low';
  const prioLabel = task.priority==='high'?'High':task.priority==='med'?'Med':'Low';

  el.innerHTML=`
    <div class="card-actions">
      <button class="card-action-btn" onclick="editTask(${task.id})">✏</button>
      <button class="card-action-btn" onclick="deleteTask(${task.id})">✕</button>
    </div>
    <div class="card-sub">${task.sub}</div>
    <div class="card-title">${escHtml(task.title)}</div>
    <div class="card-meta">
      <span class="card-points">${task.points} pt${task.points!==1?'s':''}</span>
      <span class="card-priority ${prioClass}">${prioLabel}</span>
    </div>
  `;

  el.addEventListener('dragstart', e=>{ dragId=task.id; el.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
  el.addEventListener('dragend', ()=>{ el.classList.remove('dragging'); dragId=null; clearDragOver(); });
  return el;
}

function updateCounts(){
  ['todo','inprog','review','done'].forEach(col=>{
    const count = tasks.filter(t=>t.col===col).length;
    document.getElementById('cnt-'+col).textContent=count;
  });
}

function updateStats(){
  const total = tasks.length;
  const inprog = tasks.filter(t=>t.col==='inprog').length;
  const done = tasks.filter(t=>t.col==='done').length;
  const pts = tasks.reduce((a,t)=>a+Number(t.points),0);
  const donePts = tasks.filter(t=>t.col==='done').reduce((a,t)=>a+Number(t.points),0);
  const pct = pts>0?Math.round(donePts/pts*100):0;

  document.getElementById('statTotal').textContent=total;
  document.getElementById('statInprog').textContent=inprog;
  document.getElementById('statDone').textContent=done;
  document.getElementById('statPts').textContent=pts+' pts';
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressPct').textContent=pct+'%';
}

// ── DRAG & DROP ───────────────────────────────────────────
function onDragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  const wrap = e.currentTarget;
  const col = wrap.id.replace('cards-','');
  document.getElementById('dz-'+col).classList.add('active');
}
function onDragLeave(e){
  const wrap = e.currentTarget;
  if(!wrap.contains(e.relatedTarget)){
    const col = wrap.id.replace('cards-','');
    document.getElementById('dz-'+col).classList.remove('active');
  }
}
function onDrop(e,col){
  e.preventDefault();
  clearDragOver();
  if(dragId==null) return;
  const task = tasks.find(t=>t.id===dragId);
  if(task && task.col!==col){
    task.col=col;
    showToast(`Moved to ${colLabel(col)}`);
    render();
  }
}
function clearDragOver(){
  document.querySelectorAll('.drop-zone').forEach(dz=>dz.classList.remove('active'));
}
function colLabel(c){return{todo:'Backlog',inprog:'In Progress',review:'Review',done:'Done'}[c]||c}

// ── MODAL ─────────────────────────────────────────────────
function openModal(defaultCol){
  editingId=null;
  document.getElementById('modalTitle').textContent='New Task';
  document.getElementById('fTitle').value='';
  document.getElementById('fDesc').value='';
  document.getElementById('fSub').value='CAD';
  document.getElementById('fPriority').value='med';
  document.getElementById('fPoints').value='3';
  document.getElementById('fCol').value=defaultCol||'todo';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),100);
}
function editTask(id){
  const task=tasks.find(t=>t.id===id);
  if(!task) return;
  editingId=id;
  document.getElementById('modalTitle').textContent='Edit Task';
  document.getElementById('fTitle').value=task.title;
  document.getElementById('fDesc').value=task.desc||'';
  document.getElementById('fSub').value=task.sub;
  document.getElementById('fPriority').value=task.priority;
  document.getElementById('fPoints').value=task.points;
  document.getElementById('fCol').value=task.col;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),100);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open')}
function closeModalOnBg(e){if(e.target===document.getElementById('modalOverlay')) closeModal()}

function saveTask(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){document.getElementById('fTitle').focus();return}
  const data={
    title,
    desc:document.getElementById('fDesc').value.trim(),
    sub:document.getElementById('fSub').value,
    priority:document.getElementById('fPriority').value,
    points:Number(document.getElementById('fPoints').value),
    col:document.getElementById('fCol').value,
  };
  if(editingId!=null){
    Object.assign(tasks.find(t=>t.id===editingId), data);
    showToast('Task updated');
  } else {
    tasks.push({id:nextId++,...data});
    showToast('Task added');
  }
  closeModal();
  render();
}

// ── FILTERS ───────────────────────────────────────────────
function setSubFilter(sub){
  activeSubFilter=sub;
  document.getElementById('filterAll').classList.toggle('active', sub==='all');
  ['CAD','Electrical','Machining','Controls','Business','Media','Outreach','Programming'].forEach(s=>{
    document.getElementById('pill-'+s).classList.toggle('active', sub===s);
  });
  render();
}
function togglePriorityFilter(p,btn){
  if(activePriorityFilters.has(p)) activePriorityFilters.delete(p);
  else activePriorityFilters.add(p);
  btn.classList.toggle('active', activePriorityFilters.has(p));
  render();
}

// ── DELETE ────────────────────────────────────────────────
function deleteTask(id){
  tasks=tasks.filter(t=>t.id!==id);
  showToast('Task removed');
  render();
}

// ── SPRINT NAME ───────────────────────────────────────────
document.getElementById('sprintName').addEventListener('blur', function(){
  if(!this.value.trim()) this.value='Sprint 1';
});
document.getElementById('sprintName').addEventListener('keydown', function(e){
  if(e.key==='Enter') this.blur();
});

// ── TOAST ─────────────────────────────────────────────────
let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

// ── KEYBOARD ──────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openModal();}
});

// ── UTILS ─────────────────────────────────────────────────
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──────────────────────────────────────────────────
render();
</script>
</body>
</html>
